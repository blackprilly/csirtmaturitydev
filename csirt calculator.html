<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>CSIRT Trust | Maturity Assessment – Step Wizard</title>

    <style>
        :root {
            --bg: #0b1120;
            --card-bg: rgba(17, 25, 40, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-light: #818cf8;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.12), transparent 70%);
            background-attachment: fixed;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header .logo {
            font-size: 2.5rem;
            margin-bottom: 0.3rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Wizard progress */
        .wizard-progress {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            transition: background 0.3s;
        }
        .step-dot.completed {
            background: var(--primary-light);
        }
        .step-dot.active {
            background: white;
            box-shadow: 0 0 8px var(--primary-light);
        }

        /* Question card */
        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .pillar-tag {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .pillar-people { background: rgba(99,102,241,0.2); color: #a5b4fc; }
        .pillar-process { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .pillar-tech { background: rgba(236,72,153,0.2); color: #f9a8d4; }

        .domain-id {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        .domain-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1rem;
        }
        .domain-question {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .domain-objective {
            font-size: 0.85rem;
            color: var(--primary-light);
            font-style: italic;
            margin-bottom: 1.5rem;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
        }
        .radio-option:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .radio-option.selected {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }
        .radio-option input[type="radio"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .option-content {
            flex: 1;
        }
        .option-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: white;
        }
        .option-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .score-badge {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-prev {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .btn-prev:hover {
            background: rgba(255,255,255,0.05);
        }
        .btn-next {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn-next:hover {
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }
        .btn-submit {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            width: 100%;
            justify-content: center;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Results (unchanged) */
        .results-container {
            display: none;
            margin-top: 2rem;
        }
        .results-container.show {
            display: block;
        }
        .tier-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            margin-bottom: 1.5rem;
        }
        .tier-name {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-light);
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        .radar-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(12px);
        }
        .radar-inner {
            max-width: 350px;
            margin: 0 auto;
        }
        .rec-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            margin-bottom: 1rem;
        }
        .target-tier-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .rec-domain {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
        }
        .gap-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        .gap-critical { background: rgba(239,68,68,0.2); color: #f87171; }
        .gap-moderate { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .gap-minor { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .resource-link {
            display: inline-block;
            margin: 0.2rem 0.3rem 0.2rem 0;
            padding: 0.25rem 0.7rem;
            background: rgba(99,102,241,0.15);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary-light);
            text-decoration: none;
        }
        .resource-link:hover { background: rgba(99,102,241,0.3); }

        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🛡️</div>
        <h1>CSIRT Trust</h1>
        <p>Maturity Assessment – Step‑by‑Step Wizard</p>
    </div>

    <!-- Wizard Progress -->
    <div class="wizard-progress" id="wizardProgress">
        <div class="progress-header">
            <span>Question <span id="currentStepSpan">1</span> of <span id="totalStepsSpan">9</span></span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="step-indicator" id="stepDots"></div>
    </div>

    <!-- Question Card -->
    <div class="question-card" id="questionCard">
        <!-- dynamically filled -->
    </div>

    <!-- Navigation Buttons -->
    <div class="nav-buttons" id="navButtons">
        <button class="btn btn-prev" id="btnPrev" onclick="prevStep()">← Sebelumnya</button>
        <button class="btn btn-next" id="btnNext" onclick="nextStep()">Selanjutnya →</button>
        <button class="btn btn-submit" id="btnSubmit" style="display:none;" onclick="submitAssessment()">📊 Submit Assessment</button>
    </div>

    <!-- Results (hidden initially) -->
    <div class="results-container" id="resultsContainer">
        <div class="tier-card" id="tierCard"></div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="radar-section">
            <div class="radar-inner"><canvas id="radarChart"></canvas></div>
        </div>
        <div class="rec-section" id="recSection"></div>
        <button class="btn btn-outline" onclick="resetAssessment()">↺ Ulangi Assessment</button>
    </div>
</div>

        T3:{ target2:{ people:['Organisasi perlu mengidentifikasi proses yang dapat diotomatisasi.','Organisasi perlu melatih dasar scripting.'], process:['Organisasi perlu mendokumentasikan proses manual.','Organisasi perlu memprioritaskan otomatisasi berdasarkan dampak.'], technology:['Organisasi perlu menggunakan skrip untuk tugas rutin.','Organisasi perlu menerapkan scheduled tasks / cron.'], resources:[{name:'n8n - workflow automation',url:'https://n8n.io/'},{name:'Shuffle SOAR',url:'https://shuffler.io/'}] }, target3:{ people:['Organisasi perlu merekrut automation engineer.','Organisasi perlu melatih tim dalam penggunaan SOAR.'], process:['Organisasi perlu mengimplementasikan playbook otomatis.','Organisasi perlu mengukur efektivitas otomatisasi.'], technology:['Organisasi perlu men-deploy platform SOAR.','Organisasi perlu mengintegrasikan API antar perangkat keamanan.'], resources:[{name:'TheHive + Cortex',url:'https://thehive-project.org/'},{name:'Shuffle SOAR',url:'https://shuffler.io/'}] }, target4:{ people:['Organisasi perlu merekrut AI/ML engineer.','Organisasi perlu mengintegrasikan DevSecOps.'], process:['Organisasi perlu membangun pipeline IR otomatis penuh.','Organisasi perlu menerapkan self‑healing systems.'], technology:['Organisasi perlu menggunakan SOAR berbasis AI.','Organisasi perlu menerapkan respons otonom.'], resources:[{name:'FIRST CVSS v4.0 Calculator',url:'https://www.first.org/cvss/'},{name:'Cortex (TheHive)',url:'https://github.com/TheHive-Project/Cortex'}] } }
    };

    // ── State ──
    let currentStep = 0;              // index into DOMAINS array
    const answers = {};              // domainId -> score
    let radarChart = null;

    // ── Build wizard UI ──
    function buildStepDots() {
        const dotsContainer = document.getElementById('stepDots');
        dotsContainer.innerHTML = '';
        for (let i = 0; i < DOMAINS.length; i++) {
            const dot = document.createElement('span');
            dot.className = 'step-dot';
            if (i < currentStep || answers[DOMAINS[i].id] !== undefined) dot.classList.add('completed');
            if (i === currentStep) dot.classList.add('active');
            dotsContainer.appendChild(dot);
        }
    }

    function buildQuestionCard() {
        const domain = DOMAINS[currentStep];
        const card = document.getElementById('questionCard');
        const pillarClass = domain.pillar === 'People' ? 'pillar-people' : domain.pillar === 'Process' ? 'pillar-process' : 'pillar-tech';
        card.innerHTML = `
            <span class="pillar-tag ${pillarClass}">${domain.pillar}</span>
            <div class="domain-id">${domain.id}</div>
            <div class="domain-name">${domain.name}</div>
            <p class="domain-question">${domain.question}</p>
            <p class="domain-objective">🎯 ${domain.objective}</p>
            <div class="radio-group" id="radioGroup"></div>
        `;
        const radioGroup = document.getElementById('radioGroup');
        SCORE_OPTIONS.forEach(opt => {
            const label = document.createElement('label');
            label.className = 'radio-option';
            if (answers[domain.id] === opt.value) label.classList.add('selected');
            label.setAttribute('data-value', opt.value);
            label.innerHTML = `
                <input type="radio" name="score" value="${opt.value}" ${answers[domain.id] === opt.value ? 'checked' : ''}>
                <div class="option-content">
                    <div class="option-label">${opt.label}</div>
                    <div class="option-desc">${opt.desc}</div>
                </div>
                <span class="score-badge">Skor ${opt.value}</span>
            `;
            label.addEventListener('click', () => selectOption(domain.id, opt.value, label));
            radioGroup.appendChild(label);
        });
    }

    function selectOption(domainId, value, labelElement) {
        answers[domainId] = value;
        // Update visual
        const parent = labelElement.parentElement;
        parent.querySelectorAll('.radio-option').forEach(el => el.classList.remove('selected'));
        labelElement.classList.add('selected');
        // Ensure radio is checked
        const radio = labelElement.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
        updateProgress();
    }

    function updateProgress() {
        const answered = Object.keys(answers).length;
        const pct = Math.round((answered / DOMAINS.length) * 100);
        document.getElementById('progressPercent').textContent = pct + '%';
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('currentStepSpan').textContent = currentStep + 1;
        buildStepDots();
    }

    function updateNavigation() {
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnSubmit = document.getElementById('btnSubmit');

        if (currentStep === 0) {
            btnPrev.style.display = 'none';
        } else {
            btnPrev.style.display = 'inline-flex';
        }

        if (currentStep === DOMAINS.length - 1) {
            btnNext.style.display = 'none';
            btnSubmit.style.display = 'inline-flex';
        } else {
            btnNext.style.display = 'inline-flex';
            btnSubmit.style.display = 'none';
        }
    }

    function nextStep() {
        const domain = DOMAINS[currentStep];
        // Only allow next if answer selected (optional enforcement)
        if (answers[domain.id] === undefined) {
            alert('Silakan pilih jawaban terlebih dahulu.');
            return;
        }
        if (currentStep < DOMAINS.length - 1) {
            currentStep++;
            refreshStep();
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            refreshStep();
        }
    }

    function refreshStep() {
        buildQuestionCard();
        updateProgress();
        updateNavigation();
        document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Submit & Results ──
    function submitAssessment() {
        // Ensure last question answered
        if (answers[DOMAINS[currentStep].id] === undefined) {
            alert('Silakan pilih jawaban untuk pertanyaan terakhir.');
            return;
        }
        // Collect scores
        const scores = {};
        DOMAINS.forEach(d => {
            scores[d.id] = answers[d.id] !== undefined ? answers[d.id] : 0;
        });
        const people = DOMAINS.filter(d=>d.pillar==='People').map(d=>scores[d.id]);
        const process = DOMAINS.filter(d=>d.pillar==='Process').map(d=>scores[d.id]);
        const tech = DOMAINS.filter(d=>d.pillar==='Technology').map(d=>scores[d.id]);
        const pAvg = avg(people), prAvg = avg(process), tAvg = avg(tech);
        const overall = (pAvg + prAvg + tAvg) / 3;

        let currentTier = TIERS[0];
        for (let i=TIERS.length-1; i>=0; i--) { if (overall >= TIERS[i].min) { currentTier = TIERS[i]; break; } }
        const targetTier = currentTier.id < 4 ? TIERS[currentTier.id] : currentTier;

        // Hide wizard, show results
        document.getElementById('wizardProgress').style.display = 'none';
        document.getElementById('questionCard').style.display = 'none';
        document.getElementById('navButtons').style.display = 'none';
        const resultsContainer = document.getElementById('resultsContainer');
        resultsContainer.classList.add('show');
        resultsContainer.style.display = 'block';

        document.getElementById('tierCard').innerHTML = `
            <h2>Current Maturity Tier</h2>
            <div class="tier-name" style="color:${currentTier.color};">${currentTier.name}</div>
            <div>Overall Score: <strong>${overall.toFixed(2)}</strong> / 4.00</div>
            <p style="color:var(--text-secondary);margin-top:0.5rem;">${currentTier.desc}</p>`;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-value">${pAvg.toFixed(2)}</div><div class="stat-label">👥 People</div></div>
            <div class="stat-card"><div class="stat-value">${prAvg.toFixed(2)}</div><div class="stat-label">🔄 Process</div></div>
            <div class="stat-card"><div class="stat-value">${tAvg.toFixed(2)}</div><div class="stat-label">💻 Technology</div></div>`;
        updateRadar(pAvg, prAvg, tAvg);
        buildRecommendations(scores, currentTier, targetTier);
        resultsContainer.scrollIntoView({ behavior: 'smooth' });
    }

    function avg(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }

    function updateRadar(p, pr, t) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type:'radar',
            data:{ labels:['People','Process','Technology'], datasets:[{ data:[p,pr,t], backgroundColor:'rgba(99,102,241,0.2)', borderColor:'#818cf8', borderWidth:2, pointBackgroundColor:'#818cf8', pointRadius:5 }] },
            options:{ scales:{ r:{ beginAtZero:true, max:4, ticks:{ stepSize:1, color:'#94a3b8' }, grid:{ color:'rgba(255,255,255,0.1)' }, pointLabels:{ color:'#e2e8f0' } } }, plugins:{ legend:{display:false} } }
        });
    }

    function buildRecommendations(scores, currentTier, targetTier) {
        let html = '';
        if (currentTier.id < 4) {
            html += `<div class="target-tier-box"><strong>🎯 Target Tier Selanjutnya:</strong> ${targetTier.name}<br><small>Rekomendasi untuk mencapai Tier ${targetTier.id}: ${targetTier.name}</small></div>`;
        } else {
            html += `<div class="target-tier-box" style="background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);"><strong>✅ Tier Optimized Tercapai!</strong><br><small>Pertahankan dan tingkatkan continuously.</small></div>`;
        }
        const targetId = targetTier.id;
        const recKey = `target${targetId}`;
        DOMAINS.forEach(d => {
            const score = scores[d.id];
            const gap = targetId - score;
            if (gap > 0 || currentTier.id === 4) {
                const gapClass = gap>=3?'gap-critical':gap>=2?'gap-moderate':'gap-minor';
                const rec = RECOMMENDATIONS[d.id];
                let pRec=[], prRec=[], tRec=[], resources=[];
                if (rec && rec[recKey]) {
                    pRec = rec[recKey].people || [];
                    prRec = rec[recKey].process || [];
                    tRec = rec[recKey].technology || [];
                    resources = rec[recKey].resources || [];
                }
                if (!pRec.length) pRec = ['Organisasi perlu meningkatkan kesadaran dan kompetensi tim IR.'];
                if (!prRec.length) prRec = ['Organisasi perlu mendokumentasikan dan menstandarisasi prosedur IR.'];
                if (!tRec.length) tRec = ['Organisasi perlu mengevaluasi dan mengimplementasikan tools yang sesuai.'];

                html += `<div class="rec-domain"><h4>${d.id}. ${d.name} <span class="gap-badge ${gapClass}">Gap: ${gap}</span></h4>`;
                html += `<p><strong>👥 People:</strong><br>${pRec.map(r=>'‣ '+r).join('<br>')}</p>`;
                html += `<p><strong>🔄 Process:</strong><br>${prRec.map(r=>'‣ '+r).join('<br>')}</p>`;
                html += `<p><strong>💻 Technology:</strong><br>${tRec.map(r=>'‣ '+r).join('<br>')}</p>`;
                if (resources.length) {
                    html += `<p><strong>📚 Resources:</strong><br>`;
                    resources.forEach(res => { html += `<a class="resource-link" href="${res.url}" target="_blank">🔗 ${res.name}</a>`; });
                    html += `</p>`;
                }
                html += `</div>`;
            }
        });
        document.getElementById('recSection').innerHTML = html;
    }

    function resetAssessment() {
        // Clear answers and reset state
        for (let id in answers) delete answers[id];
        currentStep = 0;
        document.getElementById('wizardProgress').style.display = '';
        document.getElementById('questionCard').style.display = '';
        document.getElementById('navButtons').style.display = '';
        document.getElementById('resultsContainer').classList.remove('show');
        document.getElementById('resultsContainer').style.display = 'none';
        refreshStep();
    }

    // Initial render
    document.getElementById('totalStepsSpan').textContent = DOMAINS.length;
    refreshStep();
</script>
